<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Forrestfield Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        header {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Responsive styles */
        @media only screen and (max-width: 768px) {
            .container {
                padding: 10px;
            }
            header {
                padding: 5px 10px;
            }
        }

        @media only screen and (max-width: 480px) {
            body {
                font-size: 14px;
            }
            header {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Forrestfield Website</h1>
    </header>
    <div class="container">
        <p>This is a sample paragraph to showcase the improved responsive design.</p>
    </div>
</body>
</html>
